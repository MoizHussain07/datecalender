<!DOCTYPE html>
<html>
<head>
    <title>Student Bio Formatter</title>
</head>
<body>

    <h2>Student Bio Formatter</h2>

    <input type="text" id="name" placeholder="Student Full Name"><br><br>
    <input type="text" id="city" placeholder="City"><br><br>
    <textarea id="intro" placeholder="Short Introduction"></textarea><br><br>
    <button onclick="formatInfo()">Format Information</button>
    <div id="output"></div>

    <script>
        function formatInfo() {
            let name = document.getElementById("name").value.trim();
            let city = document.getElementById("city").value.toLowerCase();
            let intro = document.getElementById("intro").value;

            let nameLength = name.length;
            let firstName = name.slice(0, name.indexOf(" "));
            let upperName = name.toUpperCase();
            let updatedIntro = intro.replaceAll("student", "developer");
            let first20 = updatedIntro.substring(0, 20);

            document.getElementById("output").innerHTML = `
            <p><b>Clean Name:</b> ${name}</p>
            <p><b>Name Length:</b> ${nameLength}</p>
            <p><b>First Name:</b> ${firstName}</p>
            <p><b>Uppercase Name:</b> ${upperName}</p>
            <p><b>City:</b> ${city}</p>
            <p><b>Updated Introduction:</b> ${updatedIntro}</p>
            <p><b>First 20 Characters:</b> ${first20}</p>
            `;
        }
    </script>

</body>
</html>
